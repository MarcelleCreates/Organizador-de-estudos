<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudar Agora</title>
  <link rel="stylesheet" href="css/estilo.css" />
</head>

<body>
  <div class="estudo-container">
    <div class="label-sessao">Selecione uma sessão de estudo:</div>
    <select id="selectSessao"></select>
    <div id="cronometroDisplay">00:00</div>
    <div class="botoes-cronometro">
      <button id="btnIniciar" class="crono-btn">Iniciar</button>
      <button id="btnPausar" class="crono-btn" disabled>Pausar</button>
      <button id="btnContinuar" class="crono-btn" disabled>Continuar</button>
    </div>
    <button id="btnVoltar" class="crono-btn">Voltar ao Início</button>
  </div>
  </div>
  </div>
  <script src="js/cronometro.js"></script>
</body>

</html>
